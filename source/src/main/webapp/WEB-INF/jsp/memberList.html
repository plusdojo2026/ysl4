<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>メンバー管理</title>
<link rel="stylesheet" href="/webapp/css/common.css">
<link rel="stylesheet" href="/webapp/css/member.css">
<!-- ${pageContext.request.contextPath}/css/common.css -->
</head>

<body>
<header>
<!-- <%@ include file="/WEB-INF/jsp/header.jsp" %> -->
</header>
<footer>
<!-- <%@ include file="/WEB-INF/jsp/footer.jsp" %> -->
</footer>	
		
	<div class ="main">
		<div class="under-header">
		<img class="regist-elephant" src="/webapp/img/elephant(1).png">
		<div class="text-wrap">	
		<h3>メンバー一覧</h3>
        <h4>登録済みのメンバーの登録・確認・編集ができます。</h4>
		<p>管理者専用</p>
	</div>
	</div>
		<div class="member-dashboard">
			<div class="member-count">総メンバー数<span>9</span>人</div>
			<div class="member-count">有効メンバー数<span>7</span>人</div>
			<div class="member-count">管理者数<span>2</span>人</div>
			<div class="member-count">無効メンバー数<span>1</span>人</div>
		</div>   
            <!-- <span class="msg">${msg}</span> -->
			<form> 
                <!-- method="POST" action="<c:url value='/Controller'/>" -->
				<input type="hidden" name="page_id" value="M001">
				<div class="member-search">
				<table>
					<tr>
						<td>キーワード</td>
						<td><input type="text" class="keyword" name="keyword" value="" placeholder="氏名などで検索"></td>
                        <!-- value="${param.id }"				 -->
						<td>権限</td>
						<td>
						 <select>
							<option>一般ユーザー</option><!-- <c:if test="${param.kan == '0'}">checked</c:if> -->
							<option>管理者</option> <!-- <c:if test="${param.kan == '1'}" -->
						 </select>
						</td>
						<td>状態</td>
						<td>
						 <select>
							<option>有効</option>
							<option>無効</option>
						 </select>
						</td>                 					  
						<td colspan="2">
                          <input type="submit" class="submit-btn" name="button_id" value="検索" onclick="return regist()">
						  <input type="reset" name="button_id" value="クリア">
						</td>						  
					</tr>
				</table>
				</div>
			</form>				
		</div>
</body>
</html>
